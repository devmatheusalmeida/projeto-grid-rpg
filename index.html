<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ArcaneBoard</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <div class="container">

        <!-- Sidebar -->
        <aside class="sidebar">

            <button id="toggleSidebar">Modo Mesa</button>

            <h2>🎲 ArcaneBoard</h2>

            <div class="section">
                <h3>Iniciativa</h3>

                <input id="initiativeName" placeholder="Nome do personagem">
                <input id="initiativeValue" type="number" placeholder="Valor da iniciativa">

                <button id="addInitiative">Adicionar</button>

                <ul id="initiativeList"></ul>

                <button id="nextTurn">Próximo Turno</button>
            </div>

            <div class="section">
                <label>Jogador Ativo:</label>
                <select id="playerSelect">
                    <option value="player1">Player 1</option>
                    <option value="player2">Player 2</option>
                    <option value="player3">Player 3</option>
                </select>
            </div>

            <div class="section">
                <label>Terreno:</label>
                <select id="terrainSelect">
                    <option value="floresta">Floresta</option>
                    <option value="dungeon">Dungeon</option>
                    <option value="cidade">Cidade</option>
                </select>
            </div>

            <div class="section">
                <label>Momento:</label>
                <select id="moodSelect">
                    <option value="calmo">Calmo</option>
                    <option value="batalha">Batalha</option>
                    <option value="tenso">Tenso</option>
                </select>

                <button id="playBtn">▶️ Play</button>
                <button id="pauseBtn">⏸ Pause</button>
                <div class="section">
                    <label for="volumeControl">Volume:</label>
                    <input type="range" id="volumeControl" min="0" max="1" step="0.01" value="0.6">
                </div>
            </div>

            <button id="playMusic">Tocar Música</button>
        </aside>

        <!-- Área do mapa -->
        <main class="map-area">
            <button id="showSidebarBtn">Mostrar Menu</button>
            <div class="grid" id="grid"></div>
        </main>

    </div>

    <script src="script.js"></script>
</body>

</html>
